<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__row">
      <div class="app-header__meta">
        <span id="updated">Loading…</span>
        <span class="app-header__daterange" id="daterange" aria-hidden="true"></span>
      </div>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">Theme</button>
    </div>
    <p class="filters-label">Filter by source</p>
    <div class="filters" id="filters" aria-label="Filter by source"></div>
  </header>

  <main class="main">
    <p class="loading" id="loading">Loading feed…</p>
    <p class="error-msg" id="error" style="display: none;"></p>
    <ul class="card-list" id="card-list" style="display: none;"></ul>
  </main>

  <div class="reader-overlay" id="reader-overlay" role="dialog" aria-modal="true" aria-label="Article">
    <article class="reader" id="reader">
      <div class="reader__header">
        <button type="button" class="reader__close" id="reader-close" aria-label="Close">← Back</button>
        <p class="reader__meta" id="reader-meta"></p>
        <h1 class="reader__title" id="reader-title"></h1>
        <a class="reader__open-original" id="reader-original" href="#" target="_blank" rel="noopener">Open original</a>
      </div>
      <div class="reader__body" id="reader-body"></div>
    </article>
  </div>

  <script src="app.js"></script>
</body>
</html>
